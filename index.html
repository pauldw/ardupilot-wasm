<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArduPilot WASM Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
    #canvas-container { width: 100vw; height: 100vh; }
    #canvas-container canvas { display: block; }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #0f0;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      min-width: 220px;
      pointer-events: none;
    }
    .hud-row span { color: #8f8; font-weight: bold; }

    #cmd-panel {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      max-width: 600px;
      display: flex;
      flex-direction: column;
    }
    #cmd-log {
      background: rgba(0, 0, 0, 0.75);
      color: #ccc;
      padding: 8px 10px;
      border-radius: 6px 6px 0 0;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #cmd-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      border: 1px solid #333;
      border-top: none;
      padding: 8px 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border-radius: 0 0 6px 6px;
      outline: none;
      resize: none;
      min-height: 28px;
      max-height: 120px;
      overflow-y: auto;
    }
    #cmd-input:focus { border-color: #0f0; }
    #cmd-input::placeholder { color: #555; }

    /* Editor panel */
    #editor-panel {
      margin-bottom: 4px;
    }
    #editor-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.85);
      padding: 5px 10px;
      border-radius: 6px 6px 0 0;
      border: 1px solid #333;
      border-bottom: none;
    }
    #editor-title {
      color: #888;
      font-size: 12px;
      margin-right: auto;
    }
    #editor-toolbar button {
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #editor-toolbar button:hover:not(:disabled) { background: #333; }
    #editor-toolbar button:disabled { opacity: 0.4; cursor: default; }
    #editor-run { color: #4c4; border-color: #4c4; }
    #editor-run:hover:not(:disabled) { background: #1a2e1a; }
    #editor-stop { color: #c44; border-color: #c44; }
    #editor-stop:hover:not(:disabled) { background: #2e1a1a; }
    #editor-collapse {
      color: #666;
      border-color: #444;
      padding: 3px 6px;
      font-size: 10px;
    }
    #editor-status {
      font-size: 11px;
      color: #666;
    }
    #editor-status.running { color: #4c4; }
    #editor-status.done { color: #4c4; }
    #editor-status.stopped { color: #ca4; }
    #editor-status.error { color: #c44; }
    #editor-wrap {
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      height: 220px;
    }
    #editor-wrap .cm-editor { height: 100%; }

    /* PIP camera overlay */
    #pip-label {
      box-sizing: border-box;
    }

    /* GitHub link */
    #github-link {
      position: fixed;
      bottom: 10px;
      right: 12px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 100;
      line-height: 0;
      transition: color 0.2s;
    }
    #github-link:hover { color: rgba(255, 255, 255, 0.8); }

    /* Loading screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading-title {
      color: #0f0;
      font-size: 18px;
      margin-bottom: 32px;
      letter-spacing: 2px;
    }
    #loading-items {
      width: 340px;
    }
    .load-item {
      margin-bottom: 14px;
    }
    .load-item-label {
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 11px;
      margin-bottom: 3px;
    }
    .load-item-bar {
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .load-item-fill {
      height: 100%;
      background: #0f0;
      border-radius: 2px;
      width: 0%;
      transition: width 0.2s;
    }
    .load-item.indeterminate .load-item-fill {
      width: 30% !important;
      animation: indeterminate 1.2s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0% { margin-left: 0%; }
      50% { margin-left: 70%; }
      100% { margin-left: 0%; }
    }
    .load-item.done .load-item-fill { background: #4a4; }
    .load-item.done .load-item-label { color: #4a4; }
    #loading-attribution {
      margin-top: 24px;
      color: #555;
      font-size: 11px;
    }
    #loading-attribution a { color: #777; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div id="loading-title">ARDUPILOT WASM SIMULATOR</div>
    <div id="loading-items"></div>
    <div id="loading-attribution">Scene: <a href="https://superspl.at/scene/8f4c0957" target="_blank">Country Hotel Le Querce, Italy</a></div>
    <div id="loading-attribution">GitHub: <a href="https://github.com/pauldw/ardupilot-wasm" target="_blank">github.com/pauldw/ardupilot-wasm</a></div>
  </div>
  <div id="canvas-container"></div>
  <a id="github-link" href="https://github.com/pauldw/ardupilot-wasm" target="_blank" title="GitHub">
    <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
  </a>
  <div id="hud"></div>
  <div id="cmd-panel">
    <div id="cmd-log"></div>
    <textarea id="cmd-input" rows="1" placeholder='await drone.arm()  |  drone.help()  |  any JavaScript' autofocus></textarea>
  </div>
  <script src="/ardupilot.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
