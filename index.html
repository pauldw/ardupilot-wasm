<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArduPilot WASM Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
    #canvas-container { width: 100vw; height: 100vh; }
    #canvas-container canvas { display: block; }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #0f0;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      min-width: 220px;
      pointer-events: none;
    }
    .hud-row span { color: #8f8; font-weight: bold; }

    #cmd-panel {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      max-width: 600px;
      display: flex;
      flex-direction: column;
    }
    #cmd-log {
      background: rgba(0, 0, 0, 0.75);
      color: #ccc;
      padding: 8px 10px;
      border-radius: 6px 6px 0 0;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #cmd-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.85);
      color: #0f0;
      border: 1px solid #333;
      border-top: none;
      padding: 8px 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border-radius: 0 0 6px 6px;
      outline: none;
      resize: none;
      min-height: 28px;
      max-height: 120px;
      overflow-y: auto;
    }
    #cmd-input:focus { border-color: #0f0; }
    #cmd-input::placeholder { color: #555; }

    /* Editor panel */
    #editor-panel {
      margin-bottom: 4px;
    }
    #editor-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 0, 0, 0.85);
      padding: 5px 10px;
      border-radius: 6px 6px 0 0;
      border: 1px solid #333;
      border-bottom: none;
    }
    #editor-title {
      color: #888;
      font-size: 12px;
      margin-right: auto;
    }
    #editor-toolbar button {
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #editor-toolbar button:hover:not(:disabled) { background: #333; }
    #editor-toolbar button:disabled { opacity: 0.4; cursor: default; }
    #editor-run { color: #4c4; border-color: #4c4; }
    #editor-run:hover:not(:disabled) { background: #1a2e1a; }
    #editor-stop { color: #c44; border-color: #c44; }
    #editor-stop:hover:not(:disabled) { background: #2e1a1a; }
    #editor-collapse {
      color: #666;
      border-color: #444;
      padding: 3px 6px;
      font-size: 10px;
    }
    #editor-status {
      font-size: 11px;
      color: #666;
    }
    #editor-status.running { color: #4c4; }
    #editor-status.done { color: #4c4; }
    #editor-status.stopped { color: #ca4; }
    #editor-status.error { color: #c44; }
    #editor-wrap {
      border: 1px solid #333;
      border-top: none;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      height: 220px;
    }
    #editor-wrap .cm-editor { height: 100%; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="hud"></div>
  <div id="cmd-panel">
    <div id="cmd-log"></div>
    <textarea id="cmd-input" rows="1" placeholder='await drone.arm()  |  drone.help()  |  any JavaScript' autofocus></textarea>
  </div>
  <script src="/ardupilot.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
